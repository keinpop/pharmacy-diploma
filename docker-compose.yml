services:

  # ── Auth ──────────────────────────────────────────────────────────────────
  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile
    environment:
      GRPC_PORT:  "50051"
      DB_DSN:     "postgres://auth:auth@postgres-auth:5432/auth?sslmode=disable"
      REDIS_ADDR: "redis:6379"
    depends_on:
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "50051:50051"
    networks:
      - pharmacy-net

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     auth
      POSTGRES_PASSWORD: auth
      POSTGRES_DB:       auth
    volumes:
      - pg_auth:/var/lib/postgresql/data
      - ./auth/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth -d auth"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pharmacy-net

  # ── Inventory ─────────────────────────────────────────────────────────────
  inventory:
    build:
      context: .
      dockerfile: inventory/Dockerfile
    environment:
      GRPC_PORT:                    "50053"
      POSTGRES_DSN:                 "postgres://inventory:inventory@postgres-inventory:5432/inventory?sslmode=disable"
      REDIS_ADDR:                   "redis:6379"
      ES_ADDRESSES:                 "http://elasticsearch:9200"
      INVENTORY_EXPIRING_SOON_DAYS: "30"
      SERVICE_TOKEN:                "internal-service-secret"
      AUTH_ADDR:                    "auth:50051"
      KAFKA_BROKERS:                "kafka:9092"
    depends_on:
      postgres-inventory:
        condition: service_healthy
      redis:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "50053:50053"
    networks:
      - pharmacy-net

  postgres-inventory:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     inventory
      POSTGRES_PASSWORD: inventory
      POSTGRES_DB:       inventory
    volumes:
      - pg_inventory:/var/lib/postgresql/data
      - ./inventory/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pharmacy-net

  # ── Sales ─────────────────────────────────────────────────────────────────
  sales:
    build:
      context: .
      dockerfile: sales/Dockerfile
    environment:
      GRPC_PORT:       "50054"
      POSTGRES_DSN:    "postgres://sales:sales@postgres-sales:5432/sales?sslmode=disable"
      AUTH_ADDR:       "auth:50051"
      INVENTORY_ADDR:  "inventory:50053"
      SERVICE_TOKEN:   "internal-service-secret"
      KAFKA_BROKERS:   "kafka:9092"
    depends_on:
      postgres-sales:
        condition: service_healthy
      auth:
        condition: service_started
      inventory:
        condition: service_started
      kafka:
        condition: service_started
    ports:
      - "50054:50054"
    networks:
      - pharmacy-net

  postgres-sales:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     sales
      POSTGRES_PASSWORD: sales
      POSTGRES_DB:       sales
    volumes:
      - pg_sales:/var/lib/postgresql/data
      - ./sales/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sales -d sales"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pharmacy-net

  # ── Gateway ───────────────────────────────────────────────────────────────
  gateway:
    build:
      context: gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - auth
      - inventory
      - sales
      - analytics
    networks:
      - pharmacy-net

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    networks:
      - pharmacy-net

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - pharmacy-net

  # ── Kafka ──────────────────────────────────────────────────────────────────
  kafka:
    image: bitnami/kafka:latest
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - pharmacy-net

  # ── ClickHouse ─────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    environment:
      CLICKHOUSE_DB: analytics
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - ch_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pharmacy-net

  # ── PostgreSQL Analytics ───────────────────────────────────────────────────
  postgres-analytics:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
      POSTGRES_DB: analytics
    volumes:
      - pg_analytics:/var/lib/postgresql/data
      - ./analytics/migrations/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analytics -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pharmacy-net

  # ── Analytics ──────────────────────────────────────────────────────────────
  analytics:
    build:
      context: .
      dockerfile: analytics/Dockerfile
    environment:
      GRPC_PORT: "50055"
      POSTGRES_DSN: "postgres://analytics:analytics@postgres-analytics:5432/analytics?sslmode=disable"
      CLICKHOUSE_DSN: "clickhouse://default:@clickhouse:9000/analytics"
      KAFKA_BROKERS: "kafka:9092"
      AUTH_ADDR: "auth:50051"
      INVENTORY_ADDR: "inventory:50053"
      SERVICE_TOKEN: "internal-service-secret"
      POLL_INTERVAL: "5"
    depends_on:
      postgres-analytics:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kafka:
        condition: service_started
      auth:
        condition: service_started
      inventory:
        condition: service_started
    ports:
      - "50055:50055"
    networks:
      - pharmacy-net

volumes:
  pg_auth:
  pg_inventory:
  pg_sales:
  es_data:
  kafka_data:
  ch_data:
  pg_analytics:

networks:
  pharmacy-net:
    driver: bridge
