events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server auth:50051;
    }

    server {
        listen 8080 http2;
        http2 on;

        location /auth.AuthService/ {
            grpc_pass grpc://auth_service;
            grpc_set_header Host $host;
            grpc_set_header X-Real-IP $remote_addr;
        }

        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
