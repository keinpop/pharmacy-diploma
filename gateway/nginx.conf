events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 8080;
        http2 on;

        location /auth.AuthService/ {
            set $auth_backend "grpc://auth:50051";
            grpc_pass $auth_backend;

            grpc_set_header Host      $host;
            grpc_set_header X-Real-IP $remote_addr;

            grpc_connect_timeout 5s;
            grpc_read_timeout    30s;
            grpc_send_timeout    30s;
        }

        location /inventory.InventoryService/ {
            set $inventory_backend "grpc://inventory:50053";
            grpc_pass $inventory_backend;

            grpc_set_header Host          $host;
            grpc_set_header X-Real-IP     $remote_addr;
            grpc_set_header Authorization $http_authorization;

            grpc_connect_timeout 5s;
            grpc_read_timeout    60s;
            grpc_send_timeout    30s;
        }

        location /sales.SalesService/ {
            set $sales_backend "grpc://sales:50054";
            grpc_pass $sales_backend;

            grpc_set_header Host          $host;
            grpc_set_header X-Real-IP     $remote_addr;
            grpc_set_header Authorization $http_authorization;

            grpc_connect_timeout 5s;
            grpc_read_timeout    60s;
            grpc_send_timeout    30s;
        }

        location /healthz {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
